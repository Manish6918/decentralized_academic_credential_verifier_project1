<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Credential</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      width: 350px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
      text-align: center;
      color: #fff;
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 1.4em;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      transition: 0.3s ease;
    }

    input:focus {
      background: #fff;
      box-shadow: 0 0 8px rgba(150, 230, 161, 0.8);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #43a047;
      transform: translateY(-2px);
    }

    a {
      color: #f0fff4;
      text-decoration: none;
      font-weight: 300;
      transition: color 0.3s;
    }

    a:hover {
      color: #fff;
      text-decoration: underline;
    }

    p {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🎓 Issue Academic Credential</h2>

    {% if message %}
      <p>{{ message }}</p>
    {% endif %}

    <form method="POST" action="/issue">
      <input type="text" name="student" placeholder="Student Name" required>
      <input type="text" name="degree" placeholder="Degree" required>
      <input type="text" name="year" placeholder="Year" required>
      <button type="submit">Issue Credential</button>
    </form>

    <br>
    <a href="/student">Student Dashboard</a> |
    <a href="/verify">Verify Credential</a>
  </div>

</body>
</html>
