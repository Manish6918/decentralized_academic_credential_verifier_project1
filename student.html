<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        h2 { color: #1f2937; margin-bottom: 1.5rem; }

        /* Interactive Search Bar */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Card-style list items */
        ul { list-style: none; padding: 0; }

        li {
            background: #f9fafb;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-left: 5px solid var(--primary);
            animation: fadeIn 0.5s ease forwards;
        }

        .asset-id {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 5px;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: var(--primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Student Dashboard</h2>

    <form method="POST" class="search-box">
        <input type="text" name="student" placeholder="Enter Student Name" required>
        <button type="submit">Search</button>
    </form>

    <div class="results-area">
        {% if credentials %}
            <ul>
                {% for c in credentials %}
                    <li>
                        <strong>{{ c.degree }} ({{ c.year }})</strong>
                        <span class="asset-id">ID: {{ c.asset_id }}</span>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p style="color: #9ca3af;">No credentials found. Start your search above!</p>
        {% endif %}
    </div>

    <a href="/" class="back-link">← Return to Home</a>
</div>

</body>
</html>
